plugins {
    id "com.android.application"
}

android {
    namespace "dk.nenolink.learnportuguese2"
    compileSdk 35

    defaultConfig {
        applicationId "dk.nenolink.learnportuguese2"
        minSdk 23
        targetSdk 35
        versionCode 1
        versionName "2.0"
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

}

tasks.register("copyDebugApkForManualTesting", Copy) {
    from(layout.buildDirectory.file("outputs/apk/debug/app-debug.apk"))
    into(layout.buildDirectory.dir("outputs/manual-debug"))
    rename { "LearnPortuguese2Test.apk" }
}

tasks.configureEach { task ->
    if (task.name == "assembleDebug") {
        task.finalizedBy("copyDebugApkForManualTesting")
    }
}
